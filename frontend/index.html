<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>K线精选</title>
<link rel="stylesheet" href="css/index.css">
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>K线精选</h1>
    <p>六大战法选股 · 每日收盘后自动更新</p>
  </div>
  <div class="date-row">
    <span class="date-label">查看日期</span>
    <select id="dateSelect" class="date-select">
      <option value="today">今日</option>
    </select>
  </div>
  <div class="cards">
    <div class="card" id="stockCard" onclick="goStock()">
      <div class="card-icon">📈</div>
      <div class="card-info">
        <div class="card-title">股票K线</div>
        <div class="card-sub">六龙选股 · 点击进入</div>
      </div>
    </div>
    <div class="card" id="etfCard" onclick="location.href='etf.html'">
      <div class="card-icon">📊</div>
      <div class="card-info">
        <div class="card-title">ETF K线</div>
        <div class="card-sub">204只ETF · 点击进入</div>
      </div>
    </div>
    <div class="card" id="marketCard" onclick="location.href='market.html'">
      <div class="card-icon">📺</div>
      <div class="card-info">
        <div class="card-title">行情监控</div>
        <div class="card-sub">抱团拥挤度 · 点击进入</div>
      </div>
    </div>
    <div class="card" id="summaryCard" onclick="location.href='market_summary.html'">
      <div class="card-icon">📋</div>
      <div class="card-info">
        <div class="card-title">每日总结</div>
        <div class="card-sub">A股市场总结 · 点击进入</div>
      </div>
    </div>
    <div class="card" id="weipanCard" onclick="location.href='weipan_images.html'">
      <div class="card-icon">🌡️</div>
      <div class="card-info">
        <div class="card-title">微盘温度计</div>
        <div class="card-sub">最小市值1000 · 7维监控</div>
      </div>
    </div>
  </div>
</div>
<script src="js/app.js?v=210531"></script>
</body>
</html>
