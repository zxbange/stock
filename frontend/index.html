<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>K线精选</title>
<link rel="stylesheet" href="css/index.css">
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>K线精选</h1>
    <p>六大战法选股 · 每日收盘后自动更新</p>
  </div>
  <div class="date-row">
    <span class="date-label">查看日期</span>
    <select id="dateSelect" class="date-select">
      <option value="today">今日</option>
    </select>
  </div>
  <div class="cards">
    <div class="card" id="stockCard" onclick="goStock()">
      <div class="card-icon">📈</div>
      <div class="card-info">
        <div class="card-title">股票K线</div>
        <div class="card-sub">六龙选股 · 点击进入</div>
      </div>
    </div>
    <div class="card locked" id="etfCard">
      <div class="card-icon">📊</div>
      <div class="card-info">
        <div class="card-title">ETF K线</div>
        <div class="card-sub">ETF战法 · 敬请期待</div>
      </div>
    </div>
  </div>
</div>
<script src="js/app.js?v=210531"></script>
</body>
</html>
