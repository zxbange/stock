<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>选股数据生成中</title>
<style>
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
.container { text-align: center; background: white; padding: 48px 40px; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); max-width: 420px; }
.spinner { width: 48px; height: 48px; border: 4px solid #e0e0e0; border-top-color: #e30613; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 24px; }
@keyframes spin { to { transform: rotate(360deg); } }
h2 { color: #222; font-size: 20px; margin: 0 0 12px; }
p { color: #888; font-size: 14px; margin: 0; line-height: 1.6; }
</style>
</head>
<body>
<div class="container">
  <div class="spinner"></div>
  <h2>数据生成中</h2>
  <p>每日选股任务正在运行<br>约 5~10 分钟后自动刷新</p>
</div>
<script>setTimeout(function(){ location.reload(); }, 30000);</script>
</body>
</html>
