server {
    listen 8080;
    server_name _;

    root /home/bange/stock/frontend;

    location = / {
        try_files /index.html =404;
    }

    location = /stock.html {
        try_files /stock.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location = /stock_names.json {
        try_files /stock_names.json =404;
    }

    location = /market.html {
        try_files /market.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location = /etf.html {
        try_files /etf.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location /today/ {
        alias /home/bange/stock/daily_result/today/;
        try_files $uri =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location /today/indicators_etf/ {
        alias /home/bange/stock/daily_result/today/indicators_etf/;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location = /names.json {
        try_files /names.json =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location = /dates.json {
        alias /home/bange/stock/daily_result/dates.json;
    }

    location ~ "^/([0-9]{8})/(result_.+\.txt)$" {
        alias /home/bange/stock/daily_result/$1/$2;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location ~ "^/([0-9]{8})/(indicators/.+)$" {
        alias /home/bange/stock/daily_result/$1/$2;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location ~ "^/([0-9]{8})/(indicators_etf/.+)$" {
        alias /home/bange/stock/daily_result/$1/$2;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location ~ "^/([0-9]{8})/$" {
        return 302 /stock.html?date=$1;
    }

    location /data_kline/ { alias /home/bange/stock/data/kline/; }
    location /data_etf/    { alias /home/bange/stock/data/etf/; }
    location /data/market_crowding.csv { alias /home/bange/stock/data/market_crowding.csv; }
    location /data/weipan_metrics.csv { alias /home/bange/stock/data/weipan_metrics.csv; }
    location /weipan.html {
        try_files /weipan.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
    location = /market_summary.html {
        try_files /market_summary.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
    location = /weipan_images.html {
        try_files /weipan_images.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
    location /data/weipan_imgs/ {
        alias /home/bange/stock/data/weipan_imgs/;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
}
